<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Online - Kedai Mamayu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* CSS Sentuhan Responsif untuk Keranjang Mobile */
        @media (max-width: 768px) {
            .hero-section {
                padding: 30px 15px !important;
                margin-bottom: 15px !important;
            }
            .hero-section h1 {
                font-size: 1.6rem !important;
            }
            .card-menu img {
                height: 110px !important;
            }
            .card-menu .card-body {
                padding: 10px !important;
            }
        }
        
        /* Mengatur posisi badge angka di atas icon keranjang navbar */
        .btn-cart-notification {
            position: relative;
        }
        .btn-cart-notification .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 0.65rem;
            padding: 3px 6px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-white shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center py-2">
            <a class="navbar-brand fw-bold text-danger d-flex align-items-center m-0 fs-4" href="#">
                <img src="assets/img/Logo.jpg" alt="Logo Kedai Mamayu" style="height: 40px; width: auto; object-fit: contain;" class="me-2">
                <span>Kedai Mamayu</span>
            </a>
            
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-outline-danger btn-sm rounded-circle p-2 btn-cart-notification d-inline-block d-lg-none" 
                        type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvasMobile">
                    <i class="fas fa-shopping-basket fa-lg"></i>
                    <span class="badge bg-danger rounded-circle text-white" id="cart-count-mobile">0</span>
                </button>

                <span class="text-dark fw-medium small d-none d-sm-inline">
                    Hallo <span id="display-user" class="fw-bold text-danger">User</span>, Selamat datang
                </span>
                
                <a href="login.html" class="btn btn-outline-danger btn-sm rounded-pill px-3"><i class="fas fa-sign-out-alt"></i></a>
            </div>
        </div>
    </nav>

    <div class="hero-section text-center mb-4 bg-dark text-white py-5 px-3">
        <div class="container">
            <h1 class="fw-bold mb-2">Kedai Mamayu</h1>
            <p class="lead text-white-50 mb-0 small">Pedasnya nagih, hangatnya bikin balik lagi! ❤️</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row g-3">
            
            <div class="col-12 col-lg-8">
                <div class="d-flex align-items-center mb-3 mt-2">
                    <h5 class="fw-bold text-dark m-0"><i class="fas fa-utensils text-danger me-2"></i>Aneka Makanan</h5>
                    <div class="flex-grow-1 ms-3 border-bottom border-2 opacity-25"></div>
                </div>
                <div class="row g-2 g-md-3 mb-4" id="container-makanan"></div>

                <div class="d-flex align-items-center mb-3">
                    <h5 class="fw-bold text-dark m-0"><i class="fas fa-glass-whiskey text-danger me-2"></i>Aneka Minuman</h5>
                    <div class="flex-grow-1 ms-3 border-bottom border-2 opacity-25"></div>
                </div>
                <div class="row g-2 g-md-3" id="container-minuman"></div>
            </div>

            <div class="col-12 col-lg-4 d-none d-lg-block" id="bagian-keranjang-desktop">
                <div class="card border-0 shadow-sm p-4 bg-white" style="border-radius: 15px; position: sticky; top: 90px;">
                    <h5 class="fw-bold mb-3 d-flex justify-content-between align-items-center border-bottom pb-2">
                        <span><i class="fas fa-shopping-basket text-danger me-2"></i>Keranjang</span>
                        <span class="badge bg-danger rounded-pill" id="cart-count-desktop">0</span>
                    </h5>
                    
                    <div id="cart-items-list-desktop" class="mb-3" style="max-height: 250px; overflow-y: auto;">
                        <p class="text-muted text-center py-4 small">Keranjangmu masih kosong.</p>
                    </div>
                    
                    <div class="d-flex justify-content-between fw-bold mb-3 border-top pt-2 fs-6">
                        <span>Total Bayar:</span>
                        <span class="text-success" id="cart-total-desktop">Rp 0</span>
                    </div>
                    
                    <button class="btn btn-primary-custom w-100 py-2 text-white rounded-pill fw-bold" onclick="checkoutOrder()">
                        <i class="fas fa-paper-plane me-2"></i>Order
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div class="offcanvas offcanvas-end rounded-start-4 shadow" tabindex="-1" id="cartOffcanvasMobile" aria-labelledby="cartOffcanvasMobileLabel" style="width: 85%;">
        <div class="offcanvas-header bg-light border-bottom">
            <h5 class="offcanvas-title fw-bold text-dark" id="cartOffcanvasMobileLabel">
                <i class="fas fa-shopping-basket text-danger me-2"></i>Keranjang Belanja
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column justify-content-between">
            <div id="cart-items-list-mobile" style="max-height: 70vh; overflow-y: auto;">
                <p class="text-muted text-center py-4 small">Keranjangmu masih kosong.</p>
            </div>
            
            <div class="border-top pt-3 bg-white">
                <div class="d-flex justify-content-between fw-bold mb-3 fs-6">
                    <span>Total Bayar:</span>
                    <span class="text-success" id="cart-total-mobile">Rp 0</span>
                </div>
                <button class="btn btn-danger w-100 py-2.5 text-white rounded-pill fw-bold shadow-sm" onclick="checkoutOrder()">
                    <i class="fas fa-paper-plane me-2"></i>Order
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
