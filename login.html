<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Kedai Mamayu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .card-login {
            width: 100%;
            max-width: 400px;
            margin: 15px;
            transition: all 0.3s ease;
        }
        /* Animasi transisi smooth saat ganti form */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div id="playerLoginFormContainer" class="card border-0 shadow p-4 rounded-4 bg-white card-login fade-in">
        <div class="text-center mb-4">
            <img src="assets/img/Logo.jpg" alt="Logo Kedai Mamayu" class="shadow-sm mb-3" style="width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #dc3545;">
            <h4 class="fw-bold text-dark m-0">Selamat Datang</h4>
            <p class="text-muted small">Silakan masuk untuk mulai memesan kuliner</p>
        </div>

        <form onsubmit="handleCustomerLogin(event)">
            <div class="mb-3">
                <label for="customerUser" class="form-label small fw-bold">Username atau Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 rounded-start-pill"><i class="fas fa-user text-muted small"></i></span>
                    <input type="text" id="customerUser" class="form-control bg-light border-start-0 rounded-end-pill placeholder-sm" placeholder="Masukkan username / email anda" required autocomplete="off">
                </div>
            </div>
            
            <button type="submit" class="btn btn-danger w-100 py-2 rounded-pill fw-bold shadow-sm mb-3">
                Masuk & Lihat Menu 🌶️
            </button>

            <hr class="text-muted opacity-25My">

            <button type="button" class="btn btn-outline-secondary w-100 py-2 rounded-pill small fw-bold btn-sm" onclick="switchForm('admin')">
                <i class="fas fa-user-shield me-2"></i>Login Sebagai Admin / Kasir
            </button>
        </form>
    </div>


    <div id="adminLoginFormContainer" class="card border-0 shadow p-4 rounded-4 bg-dark text-white card-login fade-in d-none">
        <div class="text-center mb-4">
            <img src="assets/img/Logo.jpg" alt="Logo Kedai Mamayu" class="shadow-sm mb-3" style="width: 90px; height: 90px; object-fit: cover; border-radius: 50%; border: 3px solid #0d6efd; background: white; padding: 2px;">
            <h4 class="fw-bold text-white m-0">Login Admin</h4>
            <p class="text-white-50 small">Sistem autentikasi enkripsi kasir</p>
        </div>

        <form onsubmit="handleAdminLogin(event)">
            <div class="mb-3">
                <label for="adminUser" class="form-label small fw-bold text-white-50">Username Admin</label>
                <div class="input-group">
                    <span class="input-group-text bg-secondary border-0 text-white rounded-start-pill"><i class="fas fa-lock text-white-50 small"></i></span>
                    <input type="text" id="adminUser" class="form-control bg-secondary border-0 text-white rounded-end-pill placeholder-sm" placeholder="Username kasir" required autocomplete="off">
                </div>
            </div>

            <div class="mb-3">
                <label for="adminPass" class="form-label small fw-bold text-white-50">Password PIN</label>
                <div class="input-group">
                    <span class="input-group-text bg-secondary border-0 text-white rounded-start-pill"><i class="fas fa-key text-white-50 small"></i></span>
                    <input type="password" id="adminPass" class="form-control bg-secondary border-0 text-white rounded-end-pill placeholder-sm" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold shadow-sm mb-3">
             Masuk <i class="fas fa-sign-in-alt ms-1"></i>
            </button>

            <hr class="text-white-50 opacity-25">

            <button type="button" class="btn btn-outline-light w-100 py-2 rounded-pill small fw-bold btn-sm" onclick="switchForm('customer')">
                <i class="fas fa-arrow-left me-2"></i>Kembali ke Menu Pelanggan
            </button>
        </form>
    </div>

    <script>
        // Fungsi untuk menukar tampilan form (Pelanggan <-> Admin)
        function switchForm(target) {
            let customerForm = document.getElementById('playerLoginFormContainer');
            let adminForm = document.getElementById('adminLoginFormContainer');

            if (target === 'admin') {
                customerForm.classList.add('d-none');
                adminForm.classList.remove('d-none');
            } else {
                adminForm.classList.add('d-none');
                customerForm.classList.remove('d-none');
            }
        }

        // Jalur Logika Login 1: Pelanggan (Username / Email)
        function handleCustomerLogin(e) {
            e.preventDefault();
            let customerInput = document.getElementById('customerUser').value.trim();
            
            if(!customerInput) return;

            // Simpan nama pelanggan/email ke localStorage agar bisa dipanggil di index.html
            localStorage.setItem('currentUser', customerInput);
            
            // Langsung arahkan ke lembar menu makanan utama
            window.location.href = 'index.html';
        }

        // Jalur Logika Login 2: Khusus Admin Kasir (Memakai Password Proteksi)
        function handleAdminLogin(e) {
            e.preventDefault();
            let userAdmin = document.getElementById('adminUser').value.trim();
            let passAdmin = document.getElementById('adminPass').value;

            // Kredensial Pengaman Masuk Admin (Silakan diubah sesuai keinginan kamu)
            // Default Username: admin | Password: admin
            if (userAdmin === 'admin' && passAdmin === 'admin') {
                localStorage.setItem('currentUser', 'Admin Kasir');
                window.location.href = 'admin.html';
            } else {
                alert('Akses Ditolak! Kombinasi Username & Password Admin salah.');
            }
        }
    </script>
</body>
</html>
